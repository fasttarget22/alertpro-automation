name: Clean Bounces Hourly
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Delete bounce emails
        run: |
          python3 << 'PYTHON'
          import imaplib
          mail = imaplib.IMAP4_SSL("imap.gmail.com", timeout=30)
          mail.login("alertprocctv@gmail.com", "ltvo whwc chok lyez")
          mail.select("INBOX")
          total = 0
          for kw in [
              'FROM "mailer-daemon"',
              'FROM "Mail Delivery Subsystem"',
              'FROM "postmaster"',
              'SUBJECT "Delivery Status Notification"',
              'SUBJECT "Delivery incomplete"',
              'SUBJECT "Message not delivered"',
              'SUBJECT "Undeliverable"',
              'SUBJECT "Mail delivery failed"',
              'SUBJECT "Failure Notice"'
          ]:
              try:
                  _, msgs = mail.search(None, kw)
                  for i in msgs[0].split():
                      mail.store(i, "+FLAGS", "\\Deleted")
                      total += 1
              except: pass
          mail.expunge()
          mail.logout()
          print(f"Deleted {total} bounce emails!")
          PYTHON
