name: Daily Smoke Shop Emails (Real)
on:
  schedule:
    - cron: '0 8 * * *'

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Send real smoke shop emails
        run: python3 send_smoke_shops_real.py
      - name: Log completion
        run: echo "✅ Real emails sent successfully"
