name: Daily AlertPro Agent
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 googlesearch-python

      - name: Create data folder
        run: mkdir -p data

      - name: Run daily agent
        run: python daily_agent.py

      - name: Save sent log
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull origin main --rebase || true
          git add data/sent_log.csv || true
          git diff --staged --quiet || git commit -m "Update sent log $(date +%Y-%m-%d)"
          git push origin main || true
