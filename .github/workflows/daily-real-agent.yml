name: Daily AlertPro Agent
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run daily agent
        run: |
          mkdir -p data
          python daily_agent.py
      - name: Save sent log to prevent duplicates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/sent_log.csv || true
          git commit -m "Update sent log - $(date +%Y-%m-%d)" || true
          git push || true
